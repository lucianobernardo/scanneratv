<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Scanner EAG</title>

<style>

body{

margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:#eef3f8;
text-align:center;

}

h1{

color:#1565c0;
margin-bottom:20px;

}

video{

width:100%;
max-width:500px;
border-radius:15px;
border:4px solid #1976d2;
box-shadow:0 4px 15px rgba(0,0,0,.2);

}

#status{

margin-top:20px;
padding:18px;
font-size:22px;
font-weight:bold;
border-radius:12px;
background:white;
transition:.3s;

}

.ok{

background:#dcedc8;
color:#2e7d32;

}

.erro{

background:#ffcdd2;
color:#b71c1c;

}

</style>

</head>

<body>

<h1>

📷 Scanner EAG

</h1>

<video id="video"></video>

<div id="status">

📷 Aguardando leitura...

</div>

<audio id="bip" preload="auto">

<source src="https://actions.google.com/sounds/v1/cartoon/pop.ogg">

</audio>

<script type="module">

import QrScanner from "https://unpkg.com/qr-scanner@1.4.2/qr-scanner.min.js";

QrScanner.WORKER_PATH="https://unpkg.com/qr-scanner@1.4.2/qr-scanner-worker.min.js";

const video=document.getElementById("video");

const status=document.getElementById("status");

const bip=document.getElementById("bip");

let bloqueado=false;

const scanner=new QrScanner(

video,

(resultado)=>{

if(bloqueado){

return;

}

bloqueado=true;

const codigo=resultado.data;

bip.currentTime=0;

bip.play().catch(()=>{});

status.className="ok";

status.innerHTML=

"✅ Matrícula lida<br><br>"+

codigo;

/*************************************************
 * ENVIA PARA O APPS SCRIPT
 *************************************************/

if(window.opener){

window.opener.postMessage(

{

matricula:codigo

},

"*"

);

}

/*************************************************
 * LIBERA NOVA LEITURA
 *************************************************/

setTimeout(function(){

bloqueado=false;

status.className="";

status.innerHTML=

"📷 Aguardando leitura...";

},300);

},

{

preferredCamera:"environment",

highlightScanRegion:true,

highlightCodeOutline:true,

returnDetailedScanResult:true,

maxScansPerSecond:8

}

);

/*************************************************
 * INICIAR CÂMERA
 *************************************************/

scanner.start()

.then(function(){

status.innerHTML=

"📷 Aguardando leitura...";

})

.catch(function(err){

status.className="erro";

status.innerHTML=

"❌ Erro ao acessar a câmera.<br><br>"+

err;

console.log(err);

});

</script>

</body>

</html>
