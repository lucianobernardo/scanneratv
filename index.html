<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Scanner QR Code</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{

font-family:Arial,sans-serif;

margin:0;

padding:20px;

text-align:center;

background:#f5f5f5;

}

h1{

color:#1976D2;

}

#reader{

width:100%;

max-width:500px;

margin:auto;

}

#status{

margin-top:20px;

font-size:22px;

font-weight:bold;

color:#1976D2;

}

</style>

</head>

<body>

<h1>

📷 Scanner QR Code

</h1>

<div id="reader"></div>

<div id="status">

Abrindo câmera...

</div>

<script>

let lendo=false;

const scanner=new Html5QrcodeScanner(

"reader",

{

fps:10,

qrbox:250,

rememberLastUsedCamera:true

},

false

);

scanner.render(

function(decodedText){

if(lendo){

return;

}

lendo=true;

document.getElementById(

"status"

).innerHTML=

"✅ QR Code lido:<br>"+decodedText;

if(window.opener){

window.opener.postMessage(

{

matricula:decodedText

},

"*"

);

}

setTimeout(function(){

lendo=false;

},1500);

},

function(error){

}

);

</script>

</body>

</html>
