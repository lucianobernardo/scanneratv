<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Scanner EAG</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{

margin:0;

padding:20px;

font-family:Arial;

background:#f5f5f5;

text-align:center;

}

h1{

color:#1976d2;

}

#reader{

width:100%;

max-width:500px;

margin:auto;

}

#status{

margin-top:20px;

font-size:22px;

font-weight:bold;

color:#2e7d32;

}

</style>

</head>

<body>

<h1>📷 Scanner EAG</h1>

<div id="reader"></div>

<div id="status">

Aguardando leitura...

</div>

<audio id="bip">

<source src="https://actions.google.com/sounds/v1/cartoon/pop.ogg">

</audio>

<script>

let ultimoCodigo="";

let ultimoTempo=0;

const scanner=new Html5QrcodeScanner(

"reader",

{

fps:10,

qrbox:250,

rememberLastUsedCamera:true

},

false

);

scanner.render(

function(decodedText){

const agora=Date.now();

if(

decodedText==ultimoCodigo &&

agora-ultimoTempo<5000

){

return;

}

ultimoCodigo=decodedText;

ultimoTempo=agora;

document.getElementById(

"bip"

).play();

document.getElementById(

"status"

).innerHTML=

"✅ "+decodedText;

if(window.opener){

window.opener.postMessage(

{

matricula:decodedText

},

"*"

);

}

setTimeout(function(){

document.getElementById(

"status"

).innerHTML=

"Aguardando leitura...";

},1200);

},

function(error){

}

);

</script>

</body>

</html>
