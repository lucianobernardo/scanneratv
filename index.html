<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Scanner EAG</title>

<script type="module">

import QrScanner from "https://unpkg.com/qr-scanner@1.4.2/qr-scanner.min.js";

QrScanner.WORKER_PATH="https://unpkg.com/qr-scanner@1.4.2/qr-scanner-worker.min.js";

window.addEventListener("load",()=>{

const video=document.getElementById("video");

const status=document.getElementById("status");

const audio=document.getElementById("bip");

let ultimoCodigo="";

let ultimoTempo=0;

const scanner=new QrScanner(

video,

result=>{

const codigo=result.data;

const agora=Date.now();

if(

codigo==ultimoCodigo &&

agora-ultimoTempo<5000

){

return;

}

ultimoCodigo=codigo;

ultimoTempo=agora;

audio.currentTime=0;

audio.play();

status.innerHTML=

"✅ "+codigo;

status.className="ok";

if(window.opener){

window.opener.postMessage(

{

matricula:codigo

},

"*"

);

}

setTimeout(()=>{

status.innerHTML=

"📷 Aguardando leitura...";

status.className="";

},1500);

},

{

highlightScanRegion:true,

highlightCodeOutline:true,

preferredCamera:"environment",

returnDetailedScanResult:true

}

);

scanner.start();

});

</script>

<style>

body{

margin:0;

padding:20px;

font-family:Arial;

background:#eef3f8;

text-align:center;

}

h1{

color:#1565c0;

margin-bottom:20px;

}

video{

width:100%;

max-width:520px;

border-radius:15px;

border:4px solid #1976d2;

box-shadow:0 5px 20px rgba(0,0,0,.2);

}

#status{

margin-top:20px;

padding:15px;

border-radius:10px;

background:white;

font-size:24px;

font-weight:bold;

transition:.3s;

}

.ok{

background:#dcedc8 !important;

color:#2e7d32;

}

</style>

</head>

<body>

<h1>

📷 Scanner de QR Code

</h1>

<video id="video"></video>

<div id="status">

📷 Aguardando leitura...

</div>

<audio id="bip" preload="auto">

<source src="https://actions.google.com/sounds/v1/cartoon/pop.ogg">

</audio>

</body>

</html>
