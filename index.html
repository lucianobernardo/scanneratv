<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Leitor de QR Code - EAG</title>

<style>

body{
margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:#eef3f8;
text-align:center;
}

h1{
color:#1565c0;
margin-bottom:20px;
}

video{
width:100%;
max-width:500px;
border-radius:15px;
border:4px solid #1976d2;
box-shadow:0 4px 15px rgba(0,0,0,.2);
}

#status{
margin-top:20px;
padding:18px;
font-size:22px;
font-weight:bold;
border-radius:12px;
background:white;
transition:.3s;
}

.ok{
background:#dcedc8;
color:#2e7d32;
}

.erro{
background:#ffcdd2;
color:#b71c1c;
}

#btnFechar{

margin-top:20px;
width:100%;
max-width:500px;
padding:15px;
font-size:20px;
background:#c62828;
color:white;
border:none;
border-radius:12px;
cursor:pointer;

}

#btnFechar:hover{

background:#b71c1c;

}

</style>

</head>

<body>

<h1>

📷 Leitor de QR Code

</h1>

<video id="video"></video>

<div id="status">

📷 Aguardando câmera...

</div>

<button id="btnFechar">

❌ Fechar Scanner

</button>

<audio id="bip" preload="auto">

<source src="https://actions.google.com/sounds/v1/cartoon/pop.ogg">

</audio>

<script type="module">

import QrScanner from "https://unpkg.com/qr-scanner@1.4.2/qr-scanner.min.js";

QrScanner.WORKER_PATH="https://unpkg.com/qr-scanner@1.4.2/qr-scanner-worker.min.js";

const video=document.getElementById("video");

const status=document.getElementById("status");

const bip=document.getElementById("bip");

const btnFechar=document.getElementById("btnFechar");

let scanner;

let bloqueado=false;

scanner=new QrScanner(

video,

resultado=>{

if(bloqueado){

return;

}

bloqueado=true;

const codigo=resultado.data;

bip.currentTime=0;

bip.play().catch(()=>{});

status.className="ok";

status.innerHTML=

"✅ Matrícula lida<br><br>"+

codigo+

"<br><br>⏳ Aguarde 2 segundos...";

scanner.stop();

if(window.opener){

window.opener.postMessage(

{

matricula:codigo

},

"*"

);

}

else if(window.parent){

window.parent.postMessage(

{

matricula:codigo

},

"*"

);

}

setTimeout(function(){

status.className="";

status.innerHTML=

"📷 Aguardando próxima leitura...";

scanner.start();

bloqueado=false;

},2000);

},

{

preferredCamera:"environment",

highlightScanRegion:true,

highlightCodeOutline:true,

returnDetailedScanResult:true

}

);

scanner.start()

.then(function(){

status.innerHTML=

"📷 Aguardando próxima leitura...";

})

.catch(function(e){

status.className="erro";

status.innerHTML=

"❌ Erro ao abrir câmera.<br><br>"+e;

});

/*************************************************
 * FECHAR SCANNER
 *************************************************/

btnFechar.addEventListener(

"click",

async function(){

try{

await scanner.stop();

}catch(e){}

window.close();

document.body.innerHTML=

`

<div style="

padding:80px;

font-family:Arial;

text-align:center;

">

<h1>

✅ Scanner encerrado

</h1>

<br>

<p>

Pode fechar esta janela.

</p>

</div>

`;

}

);

</script>

</body>

</html>
